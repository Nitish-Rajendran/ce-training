<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <link rel="stylesheet" href="css/grid.css" />
</head>

<body>

    <div class="grid-container">
        <div class="grid-item">1</div>
        <div class="grid-item">2</div>
        <div class="grid-item">3</div>
        <div class="grid-item">4</div>
        <div class="grid-item">5</div>
        <div class="grid-item">6</div>
    </div>

    <div class="grid-container-featured">
        <div class="featured">Featured</div>
        <div class="grid-item">A</div>
        <div class="grid-item">B</div>
        <div class="grid-item">C</div>
        <div class="grid-item">D</div>
    </div>

    <div class="page-layout">
        <header class="page-header">Header</header>
        <aside class="page-sidebar">Sidebar</aside>
        <main class="page-main">Main</main>
        <footer class="page-footer">Footer</footer>
    </div>

    <div class="photo-grid">
        <div class="photo-card">1</div>
        <div class="photo-card">2</div>
        <div class="photo-card">3</div>
        <div class="photo-card">4</div>
        <div class="photo-card">5</div>
        <div class="photo-card">6</div>
    </div>

</body>

</html>
